{{ define "main" }}
    <section class="feature-hero">
        <div class="container">
            <a href="/" class="back-link">← Back to Home</a>
            <div class="feature-hero__icon">{{ .Params.icon }}</div>
            <h1>{{ .Title }}</h1>
            <p class="feature-hero__subtitle">{{ .Params.subtitle }}</p>
        </div>
    </section>

    <section class="feature-content">
        <div class="container">
            {{ .Content }}

            <div class="feature-cta">
                <p>Ready to try {{ .Title }}?</p>
                <a href="/#install" class="button button--hero-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -3px; margin-right: 8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Install VocaMac - It's Free
                </a>
            </div>
        </div>
    </section>
{{ end }}
