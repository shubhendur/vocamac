    <script>
        // ========== Mobile Menu ==========
        document.querySelector('.navbar__toggle')?.addEventListener('click', function() {
            document.querySelector('.navbar__menu')?.classList.toggle('navbar__menu--open');
        });

        // ========== Smooth Scroll ==========
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
                document.querySelector('.navbar__menu')?.classList.remove('navbar__menu--open');
            });
        });

        // ========== Scroll Animations ==========
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.feature-card, .step, .privacy__point, .model-card, .family-card, .faq__item, .screenshot-item').forEach(el => {
            observer.observe(el);
        });
    </script>
