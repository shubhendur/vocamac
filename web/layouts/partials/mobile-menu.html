    <script>
        // ========== Mobile Menu ==========
        const navToggle = document.querySelector('.navbar__toggle');
        const navMenu = document.querySelector('.navbar__menu');

        function closeMenu() {
            navMenu?.classList.remove('navbar__menu--open');
            navToggle?.classList.remove('active');
        }

        function toggleMenu() {
            navMenu?.classList.toggle('navbar__menu--open');
            navToggle?.classList.toggle('active');
        }

        navToggle?.addEventListener('click', function(e) {
            e.stopPropagation();
            toggleMenu();
        });

        // Close on tap outside
        document.addEventListener('click', function(e) {
            if (navMenu?.classList.contains('navbar__menu--open') &&
                !navMenu.contains(e.target) &&
                !navToggle.contains(e.target)) {
                closeMenu();
            }
        });

        // Close on scroll
        window.addEventListener('scroll', function() {
            if (navMenu?.classList.contains('navbar__menu--open')) {
                closeMenu();
            }
        }, { passive: true });

        // ========== Smooth Scroll ==========
        document.querySelectorAll('a[href^="#"], a[href^="/#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                const hash = href.startsWith('/#') ? href.substring(1) : href;
                e.preventDefault();
                const target = document.querySelector(hash);
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
                closeMenu();
            });
        });

        // ========== Scroll Animations ==========
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.feature-card, .step, .install__step, .privacy__point, .model-card, .family-card, .faq__item, .screenshot-item').forEach(el => {
            observer.observe(el);
        });
    </script>
