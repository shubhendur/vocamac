<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 56" fill="none">
  <!-- Apple SF Symbol "mic.fill" replica — #007AFF system blue -->

  <!-- Microphone capsule (tall pill, filled) -->
  <rect x="10" y="2" width="20" height="34" rx="10" fill="#007AFF"/>

  <!-- Cradle arc (wide U-shape, hugs bottom of capsule) -->
  <path d="M4 22C4 34.15 12.06 44 20 44C27.94 44 36 34.15 36 22"
        fill="none" stroke="#007AFF" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Stem (short, from bottom of cradle) -->
  <line x1="20" y1="44" x2="20" y2="54" stroke="#007AFF" stroke-width="3.5" stroke-linecap="round"/>
</svg>
